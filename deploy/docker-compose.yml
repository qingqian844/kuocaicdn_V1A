name: kuocai-cdn

services:
  app:
    image: eclipse-temurin:8-jre-jammy
    container_name: kuocai-cdn-app
    env_file:
      - env/app.env
    command: ["java", "-XX:+UseG1GC", "-XX:MaxRAMPercentage=75", "-Djava.security.egd=file:/dev/./urandom", "-jar", "/app/kuocai-cdn.jar"]
    volumes:
      - ./packages/kuocai-cdn.jar:/app/kuocai-cdn.jar:ro
      - ./packages/license.key:/app/license.key:ro
      - ./secrets:/app/secrets
      - app_logs:/app/logs
    expose:
      - "8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - kuocai
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/127.0.0.1/8000'"]
      interval: 10s
      timeout: 4s
      retries: 18
      start_period: 45s
    restart: unless-stopped

  caddy:
    image: caddy:2.8.4-alpine
    container_name: kuocai-cdn-caddy
    env_file:
      - env/app.env
    command: ["sh", "-c", "if [ -s /config/caddy/autosave.json ]; then exec caddy run --resume; else exec caddy run --config /etc/caddy/Caddyfile --adapter caddyfile; fi"]
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    expose:
      - "2019"
    networks:
      - kuocai
    depends_on:
      app:
        condition: service_healthy
    restart: unless-stopped

  mysql:
    image: mysql:8.0.40
    container_name: kuocai-cdn-mysql
    profiles: ["bundled-mysql"]
    env_file:
      - env/app.env
    command: ["--character-set-server=utf8mb4", "--collation-server=utf8mb4_unicode_ci", "--default-time-zone=+08:00"]
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - kuocai
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 8s
      timeout: 5s
      retries: 25
    restart: unless-stopped

  redis:
    image: redis:7.2.6-alpine
    container_name: kuocai-cdn-redis
    profiles: ["bundled-redis"]
    env_file:
      - env/app.env
    command: ["sh", "-c", "exec redis-server --appendonly yes --requirepass \"$$REDIS_PASSWORD\""]
    volumes:
      - redis_data:/data
    networks:
      - kuocai
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$$REDIS_PASSWORD\" ping | grep PONG"]
      interval: 8s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  mongodb:
    image: mongo:6.0.20-jammy
    container_name: kuocai-cdn-mongodb
    profiles: ["bundled-mongodb"]
    env_file:
      - env/app.env
    volumes:
      - mongo_data:/data/db
    networks:
      - kuocai
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet -u \"$$MONGO_INITDB_ROOT_USERNAME\" -p \"$$MONGO_INITDB_ROOT_PASSWORD\" --authenticationDatabase admin --eval 'db.runCommand({ping:1}).ok' | grep 1"]
      interval: 10s
      timeout: 6s
      retries: 20
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3.13.7-management-alpine
    container_name: kuocai-cdn-rabbitmq
    profiles: ["bundled-rabbitmq"]
    env_file:
      - env/app.env
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - kuocai
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 6s
      retries: 20
    restart: unless-stopped

  minio:
    image: minio/minio:RELEASE.2024-06-13T22-53-53Z
    container_name: kuocai-cdn-minio
    profiles: ["bundled-minio"]
    env_file:
      - env/app.env
    command: ["server", "/data", "--console-address", ":9001"]
    volumes:
      - minio_data:/data
    networks:
      - kuocai
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 20
    restart: unless-stopped

networks:
  kuocai:
    driver: bridge

volumes:
  app_logs:
  mysql_data:
  redis_data:
  mongo_data:
  rabbitmq_data:
  minio_data:
  caddy_data:
  caddy_config:
