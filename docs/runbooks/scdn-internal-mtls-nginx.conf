# Bind this server only to the private service network and allow only SCDN source addresses.
server {
    listen 8443 ssl;
    server_name cdn-scdn.internal.example;

    ssl_certificate /etc/nginx/tls/cdn-internal.crt;
    ssl_certificate_key /etc/nginx/tls/cdn-internal.key;
    ssl_client_certificate /etc/nginx/tls/scdn-client-ca.crt;
    ssl_verify_client on;
    ssl_verify_depth 2;
    ssl_protocols TLSv1.2 TLSv1.3;

    location /internal/scdn/v1/ {
        proxy_set_header X-Client-Cert-Verified $ssl_client_verify;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Host $host;
        proxy_pass http://127.0.0.1:8000;
    }

    location / {
        return 404;
    }
}
