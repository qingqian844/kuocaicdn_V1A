server.tomcat.threads.max=${SERVER_TOMCAT_THREADS_MAX:200}
server.tomcat.threads.min-spare=${SERVER_TOMCAT_THREADS_MIN_SPARE:10}

# Database
spring.datasource.username=${DB_USERNAME:}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.url=${DB_URL:}

# MongoDB
spring.data.mongodb.host=${MONGO_HOST:localhost}
spring.data.mongodb.port=${MONGO_PORT:27017}
spring.data.mongodb.username=${MONGO_USERNAME:}
spring.data.mongodb.password=${MONGO_PASSWORD:}
spring.data.mongodb.database=${MONGO_DATABASE:kuocai_cdn}

# RabbitMQ
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.username=${RABBITMQ_USERNAME:}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:}
spring.rabbitmq.virtual-host=${RABBITMQ_VHOST:/}

# Minio
minio.endpoint=${MINIO_ENDPOINT:}
minio.accessKey=${MINIO_ACCESS_KEY:}
minio.secretKey=${MINIO_SECRET_KEY:}
minio.bucketName=${MINIO_BUCKET:image}
minio.url=${MINIO_PUBLIC_URL:}

# Redis Cache
redis.pool.db=${REDIS_DB:1}
redis.host=${REDIS_HOST:localhost}
redis.port=${REDIS_PORT:6379}
redis.password=${REDIS_PASSWORD:}

# WeChat Scan
wx.appid=${WX_APP_ID:}
wx.appsecret=${WX_APP_SECRET:}
wx.token=${WX_TOKEN:}
wx.code.expiretime=${WX_CODE_EXPIRE_TIME:360}
wx.redis.openid.expiretime=${WX_REDIS_OPENID_EXPIRE_TIME:120}

# Alipay Withdrawal Limit
alipay.limit.money=${ALIPAY_LIMIT_MONEY:100}

# Whether To Open Alipay or WeChat Refund
pay.refund.enable=${PAY_REFUND_ENABLE:true}
spring.devtools.restart.enabled=false
