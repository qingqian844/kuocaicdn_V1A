# Current Project Env
spring.application.name=kuocaicdn
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# System Service
server.port=${SERVER_PORT:8000}
server.servlet.context-path=/
server.tomcat.threads.max=${SERVER_TOMCAT_THREADS_MAX:300}
server.tomcat.threads.min-spare=${SERVER_TOMCAT_THREADS_MIN_SPARE:60}
spring.task.scheduling.pool.size=${SCHEDULING_POOL_SIZE:8}
spring.task.scheduling.thread-name-prefix=scheduling-
server.servlet.session.cookie.same-site=Strict
server.servlet.session.cookie.http-only=true
server.servlet.session.tracking-modes=cookie

# Security
security.jwt.public-key=${JWT_PUBLIC_KEY:}
security.jwt.private-key=${JWT_PRIVATE_KEY:}
security.password.legacy-aes-key=${PASSWORD_LEGACY_AES_KEY:}
security.config-rsa.private-key=${CONFIG_RSA_PRIVATE_KEY:}
security.config-rsa.public-key=${CONFIG_RSA_PUBLIC_KEY:}
api.billing.token=${BILLING_API_TOKEN:}

# Alipay Face Certification
alipay.face.server-url=${ALIPAY_FACE_SERVER_URL:https://openapi.alipay.com/gateway.do}
alipay.face.app-id=${ALIPAY_FACE_APP_ID:}
alipay.face.private-key=${ALIPAY_FACE_PRIVATE_KEY:}
alipay.face.public-key=${ALIPAY_FACE_PUBLIC_KEY:}

# Alipay Authentication
alipay.authentication.server-url=${ALIPAY_AUTH_SERVER_URL:https://openapi.alipay.com/gateway.do}
alipay.authentication.app-id=${ALIPAY_AUTH_APP_ID:}
alipay.authentication.private-key=${ALIPAY_AUTH_PRIVATE_KEY:}
alipay.authentication.public-key=${ALIPAY_AUTH_PUBLIC_KEY:}
alipay.authentication.redirect-uri=${ALIPAY_AUTH_REDIRECT_URI:https://www.kuocaicdn.com/alipay-authentication-redirect}

# Cloud Provider Credentials
yifan.cdn.ak=${YIFAN_CDN_AK:}
yifan.cdn.sk=${YIFAN_CDN_SK:}
tencent.dns.secret-id=${TENCENT_DNS_SECRET_ID:}
tencent.dns.secret-key=${TENCENT_DNS_SECRET_KEY:}
tencent.dns.local-domain-name=${TENCENT_DNS_LOCAL_DOMAIN:kuocaidns.com}
qiniu.cdn.ak=${QINIU_CDN_AK:}
qiniu.cdn.sk=${QINIU_CDN_SK:}
volcengine.cdn.ak=${VOLCENGINE_CDN_AK:}
volcengine.cdn.sk=${VOLCENGINE_CDN_SK:}
volcengine.cdn.project=${VOLCENGINE_CDN_PROJECT:default}
weixin.webhook.url=${WEIXIN_WEBHOOK_URL:}

# Database
spring.datasource.username=${DB_USERNAME:}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.url=${DB_URL:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.type=com.alibaba.druid.pool.DruidDataSource

# MongoDB
spring.data.mongodb.host=${MONGO_HOST:localhost}
spring.data.mongodb.port=${MONGO_PORT:27017}
spring.data.mongodb.username=${MONGO_USERNAME:}
spring.data.mongodb.password=${MONGO_PASSWORD:}
spring.data.mongodb.authentication-database=${MONGO_AUTH_DB:admin}
spring.data.mongodb.database=${MONGO_DATABASE:kuocai_cdn}

# RabbitMQ
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:}
spring.rabbitmq.virtual-host=${RABBITMQ_VHOST:/}
spring.rabbitmq.listener.simple.acknowledge-mode=manual
spring.rabbitmq.listener.simple.retry.enabled=true
spring.rabbitmq.listener.simple.retry.max-attempts=3
spring.rabbitmq.listener.simple.default-requeue-rejected=true

# Json Datetime Format
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss
spring.jackson.time-zone=GMT+8

# Log
logging.level.com.kuocai.cdn=${LOG_LEVEL_APP:info}
logging.level.com.kuocai.cdn.dao=${LOG_LEVEL_DAO:info}
logging.level.org.springframework.boot=${LOG_LEVEL_BOOT:info}
logging.config=classpath:config/logback.xml

# SMS
sms.app-id=${SMS_APP_ID:}
sms.app-key=${SMS_APP_KEY:}
sms.sign=${SMS_SIGN:}
sms.valid-min=${SMS_VALID_MIN:5}

# File Upload
spring.servlet.multipart.max-file-size=1024MB
spring.servlet.multipart.max-request-size=1024MB

# Redis Cache
redis.timeout=${REDIS_TIMEOUT:5000}
redis.pool.max-total=${REDIS_POOL_MAX_TOTAL:2000}
redis.pool.max-wait=${REDIS_POOL_MAX_WAIT:100000}
redis.pool.max-idle=${REDIS_POOL_MAX_IDLE:64}
redis.pool.db=${REDIS_DB:0}
redis.host=${REDIS_HOST:localhost}
redis.port=${REDIS_PORT:6379}
redis.password=${REDIS_PASSWORD:}

# Minio
minio.endpoint=${MINIO_ENDPOINT:}
minio.accessKey=${MINIO_ACCESS_KEY:}
minio.secretKey=${MINIO_SECRET_KEY:}
minio.bucketName=${MINIO_BUCKET:image}
minio.url=${MINIO_PUBLIC_URL:}

# WeChat Scan
wx.appid=${WX_APP_ID:}
wx.appsecret=${WX_APP_SECRET:}
wx.token=${WX_TOKEN:}
wx.code.expiretime=${WX_CODE_EXPIRE_TIME:360}
wx.redis.openid.expiretime=${WX_REDIS_OPENID_EXPIRE_TIME:120}

# Default Proxy CName
proxy.cname=${PROXY_CNAME:dns.example.com}

# MyBatis Logo
mybatis-plus.global-config.banner=false

# Independent SCDN integration
scdn.integration.enabled=${SCDN_INTEGRATION_ENABLED:false}
scdn.integration.console-url=${SCDN_CONSOLE_URL:http://localhost:8090}
scdn.integration.internal-token=${SCDN_INTERNAL_TOKEN:}
scdn.integration.sso-code-ttl-seconds=${SCDN_SSO_CODE_TTL_SECONDS:60}
scdn.integration.access-token-ttl-seconds=${SCDN_ACCESS_TOKEN_TTL_SECONDS:900}
scdn.integration.outbox-exchange=${SCDN_OUTBOX_EXCHANGE:kuocai.scdn.platform.events}
scdn.integration.outbox-publish-delay-ms=${SCDN_OUTBOX_PUBLISH_DELAY_MS:5000}
