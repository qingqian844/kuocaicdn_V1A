    <script>
        window.hs_config = {
            "autopath": "@@autopath",
            "deleteLine": "hs-builder:delete",
            "deleteLine:build": "hs-builder:build-delete",
            "deleteLine:dist": "hs-builder:dist-delete",
            "previewMode": false,
            "startPath": "/index.html",
            "vars": {
                "themeFont": "https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap",
                "version": "?v=1.0"
            },
            "layoutBuilder": {
                "extend": {"switcherSupport": true},
                "header": {"layoutMode": "default", "containerMode": "container-fluid"},
                "sidebarLayout": "default"
            },
            "themeAppearance": {
                "layoutSkin": "default",
                "sidebarSkin": "default",
                "styles": {
                    "colors": {
                        "primary": "#377dff",
                        "transparent": "transparent",
                        "white": "#fff",
                        "dark": "132144",
                        "gray": {"100": "#f9fafc", "900": "#1e2022"}
                    }, "font": "Inter"
                }
            },
            "languageDirection": {"lang": "en"},
            "skipFilesFromBundle": {
                "dist": ["assets/js/hs.theme-appearance.js", "assets/js/hs.theme-appearance-charts.js", "assets/js/demo.js"],
                "build": ["assets/css/theme.css", "assets/vendor/hs-navbar-vertical-aside/dist/hs-navbar-vertical-aside-mini-cache.js", "assets/js/demo.js", "assets/css/theme-dark.css", "assets/css/docs.css", "assets/vendor/icon-set/style.css", "assets/js/hs.theme-appearance.js", "assets/js/hs.theme-appearance-charts.js", "node_modules/chartjs-plugin-datalabels/dist/chartjs-plugin-datalabels.min.js", "assets/js/demo.js"]
            },
            "minifyCSSFiles": ["assets/css/theme.css", "assets/css/theme-dark.css"],
            "copyDependencies": {
                "dist": {"*assets/js/theme-custom.js": ""},
                "build": {"*assets/js/theme-custom.js": "", "node_modules/bootstrap-icons/font/*fonts/**": "assets/css"}
            },
            "buildFolder": "",
            "replacePathsToCDN": {},
            "directoryNames": {"src": "./src", "dist": "./dist", "build": "./build"},
            "fileNames": {
                "dist": {"js": "theme.min.js", "css": "theme.min.css"},
                "build": {
                    "css": "theme.min.css",
                    "js": "theme.min.js",
                    "vendorCSS": "vendor.min.css",
                    "vendorJS": "vendor.min.js"
                }
            },
            "fileTypes": "jpg|png|svg|mp4|webm|ogv|json"
        }
        window.hs_config.gulpRGBA = (p1) => {
            const options = p1.split(',')
            const hex = options[0].toString()
            const transparent = options[1].toString()

            var c;
            if (/^#([A-Fa-f0-9]{3}){1,2}$/.test(hex)) {
                c = hex.substring(1).split('');
                if (c.length == 3) {
                    c = [c[0], c[0], c[1], c[1], c[2], c[2]];
                }
                c = '0x' + c.join('');
                return 'rgba(' + [(c >> 16) & 255, (c >> 8) & 255, c & 255].join(',') + ',' + transparent + ')';
            }
            throw new Error('Bad Hex');
        }
        window.hs_config.gulpDarken = (p1) => {
            const options = p1.split(',')

            let col = options[0].toString()
            let amt = -parseInt(options[1])
            var usePound = false

            if (col[0] == "#") {
                col = col.slice(1)
                usePound = true
            }
            var num = parseInt(col, 16)
            var r = (num >> 16) + amt
            if (r > 255) {
                r = 255
            } else if (r < 0) {
                r = 0
            }
            var b = ((num >> 8) & 0x00FF) + amt
            if (b > 255) {
                b = 255
            } else if (b < 0) {
                b = 0
            }
            var g = (num & 0x0000FF) + amt
            if (g > 255) {
                g = 255
            } else if (g < 0) {
                g = 0
            }
            return (usePound ? "#" : "") + (g | (b << 8) | (r << 16)).toString(16)
        }
        window.hs_config.gulpLighten = (p1) => {
            const options = p1.split(',')

            let col = options[0].toString()
            let amt = parseInt(options[1])
            var usePound = false

            if (col[0] == "#") {
                col = col.slice(1)
                usePound = true
            }
            var num = parseInt(col, 16)
            var r = (num >> 16) + amt
            if (r > 255) {
                r = 255
            } else if (r < 0) {
                r = 0
            }
            var b = ((num >> 8) & 0x00FF) + amt
            if (b > 255) {
                b = 255
            } else if (b < 0) {
                b = 0
            }
            var g = (num & 0x0000FF) + amt
            if (g > 255) {
                g = 255
            } else if (g < 0) {
                g = 0
            }
            return (usePound ? "#" : "") + (g | (b << 8) | (r << 16)).toString(16)
        }
    </script>

<script>
    $(document).on('ready', function () {
        HSCore.components.HSChartJS.init('.js-chart')

        async function queryStatistics(startTime, endTime, domains, type, userId) {
            if (!domains) {
                domains = 'all'
            }
            if (!type) {
                type = 'All'
            }
            let param = {
                startTime: startTime, endTime: endTime, domains: domains, type: type, userId
            }
            // console.log(param);
            let data = await sendRequest('GET', "CdnDomainStatistics/queryStatistics", param, 'application/x-www-form-urlencoded; charset=UTF-8', false)
            if (!data) {
                layerFail('请求失败');
            } else {
                if (data['code'] === 'SUCCESS') {
                    let result = data.data;
                    if (result && result.Resource) {
                        result.Resource.labels = result.labels;
                        return result.Resource;
                    }
                    return result;
                } else if (data['code'] === 'SERVER_BUSY') {
                    layerFail(data['message']);
                }
            }
        }

        function cb() {
            // 财务统计
            const moneyChart = HSCore.components.HSChartJS.getItem('doughnut-chart');
            let totalRecharge = [[${allAccountInfo.totalRecharge}]]
            let difference = [[${allAccountInfo.totalRecharge - allAccountInfo.difference}]]
            let moneyTotal = [totalRecharge, difference, totalRecharge - difference]
            moneyChart.data.datasets[0].data = moneyTotal
            moneyChart.update()
            // 注册
            const updatingChart = HSCore.components.HSChartJS.getItem('ecommerce-overview-1');
            updatingChart.data.datasets[1].data = [[${weekRegisterCount.lastWeekRegister}]]
            updatingChart.data.datasets[0].data = [[${weekRegisterCount.thisWeekRegister}]]
            updatingChart.update()
            // 登录
            const loginChart = HSCore.components.HSChartJS.getItem('ecommerce-overview-10');
            loginChart.data.datasets[1].data = [[${weekLoginCount.lastWeekLogin}]]
            loginChart.data.datasets[0].data = [[${weekLoginCount.thisWeekLogin}]]
            loginChart.update()
        }

        cb();

        // 流量趋势 开始
        var start = moment();
        var end = moment();
        function hideChartPoints(chart) {
            if (!chart || !chart.data || !chart.data.datasets) {
                return;
            }
            chart.data.datasets.forEach(function (dataset) {
                dataset.pointRadius = 0;
                dataset.pointHoverRadius = 0;
                dataset.pointHitRadius = 0;
            });
            chart.options.elements = chart.options.elements || {};
            chart.options.elements.point = {
                radius: 0,
                hoverRadius: 0,
                hitRadius: 0
            };
        }

async function cbFlux(start, end, lebel) {
            let name = 'flux';
            const rangeStart = start.clone();
            const rangeEnd = end.clone();
            $('#' + name + '-daterangepicker-predefined .' + name + '-daterangepicker-predefined-preview').html(rangeStart.format('YYYY/MM/DD') + ' - ' + rangeEnd.format('YYYY/MM/DD'));
            let startTime = rangeStart.format('YYYY-MM-DD') + ' 00:00:00';
            let endTime = rangeEnd.clone().add(1, 'days').format('YYYY-MM-DD') + ' 00:00:00'
            if (!lebel || lebel === '今天') {

            } else if (lebel === '昨天') {

            } else if (lebel === '最近7天') {

            } else if (lebel === '最近30天') {

            } else if (lebel === '自定义范围') {
                if (end.diff(start, 'day') > 30) {
                    layerWarn("最大支持查询天数为30天！");
                    return;
                }
            }
            try {
                let resp = await queryStatistics(startTime, endTime, null, 'Resource');
                if (!resp || !resp.resource_summary || !resp.resource_detail) {
                    return;
                }
                let labels = resp.labels;
                let flux = resp.resource_summary.flux;
                let bs_flux = resp.resource_summary.bs_flux;
                let bw = resp.resource_summary.bw;
                let bs_bw = resp.resource_summary.bs_bw;
                $('#sum_flux').text(flux === undefined ? 0 : flux);
                $('#sum_bs_flux').text(bs_flux === undefined ? 0 : bs_flux);
                $('#sum_bw').text(bw === undefined ? 0 : bw);
                $('#sum_bs_bw').text(bs_bw === undefined ? 0 : bs_bw);

                const fluxChart = HSCore.components.HSChartJS.getItem('fluxChart');
                fluxChart.data.labels = labels;
                fluxChart.data.datasets[0].data = resp.resource_detail.flux.data;
                fluxChart.data.datasets[1].data = resp.resource_detail.bs_flux.data;
                fluxChart.options.plugins.tooltip.postfix = resp.resource_detail.flux.unit;
                hideChartPoints(fluxChart);
                    fluxChart.update();
                const bwChart = HSCore.components.HSChartJS.getItem('bwChart');
                bwChart.data.labels = labels;
                bwChart.data.datasets[0].data = resp.resource_detail.bw.data;
                bwChart.data.datasets[1].data = resp.resource_detail.bs_bw.data;
                bwChart.options.plugins.tooltip.postfix = resp.resource_detail.bw.unit;
                hideChartPoints(bwChart);
                    bwChart.update();
            } catch (error) {
                console.error('Dashboard statistics loading failed:', error);
                layerFail('数据加载失败，请稍后重试');
            }
        }

        $('#flux-daterangepicker-predefined').daterangepicker({
            startDate: start,
            endDate: end,
            "locale": {//汉化
                format: "YYYY-MM-DD",
                separator: " 至 ",
                applyLabel: "应用",
                cancelLabel: "取消",
                customRangeLabel: "自定义范围",
                daysOfWeek: ['日', '一', '二', '三', '四', '五', '六'],
                monthNames: ['一月', '二月', '三月', '四月', '五月', '六月',
                    '七月', '八月', '九月', '十月', '十一月', '十二月'],
            },
            ranges: {
                '今天': [moment(), moment()],
                '昨天': [moment().subtract(1, 'days'), moment().subtract(1, 'days')],
                '最近7天': [moment().subtract(6, 'days'), moment()],
                '最近30天': [moment().subtract(29, 'days'), moment()]
            }
        }, cbFlux);
        cbFlux(start, end);
        // 流量趋势 结束
    });
</script>

<!-- Style Switcher JS -->

<script>
    (function () {
        // STYLE SWITCHER
        // =======================================================
        const $dropdownBtn = document.getElementById('selectThemeDropdown') // Dropdowon trigger
        const $variants = document.querySelectorAll(`[aria-labelledby="selectThemeDropdown"] [data-icon]`) // All items of the dropdown

        // Function to set active style in the dorpdown menu and set icon for dropdown trigger
        const setActiveStyle = function () {
            $variants.forEach($item => {
                if ($item.getAttribute('data-value') === HSThemeAppearance.getOriginalAppearance()) {
                    $dropdownBtn.innerHTML = `<i class="${$item.getAttribute('data-icon')}" />`
                    return $item.classList.add('active')
                }

                $item.classList.remove('active')
            })
        }

        // Add a click event to all items of the dropdown to set the style
        $variants.forEach(function ($item) {
            $item.addEventListener('click', function () {
                HSThemeAppearance.setAppearance($item.getAttribute('data-value'))
            })
        })

        // Call the setActiveStyle on load page
        setActiveStyle()

        // Add event listener on change style to call the setActiveStyle function
        window.addEventListener('on-hs-appearance-change', function () {
            setActiveStyle()
        })
    })()
</script>

<!-- End Style Switcher JS -->
