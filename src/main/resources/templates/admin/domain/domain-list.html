        window.hs_config = {

                    },

                }
            },
            "languageDirection": {
                "lang": "en"
            },
            "skipFilesFromBundle": {
                "dist": ["assets/js/hs.theme-appearance.js", "assets/js/hs.theme-appearance-charts.js", "assets/js/demo.js"],
                "build": ["assets/css/theme.css", "assets/vendor/hs-navbar-vertical-aside/dist/hs-navbar-vertical-aside-mini-cache.js", "assets/js/demo.js", "assets/css/theme-dark.css", "assets/css/docs.css", "assets/vendor/icon-set/style.css", "assets/js/hs.theme-appearance.js", "assets/js/hs.theme-appearance-charts.js", "node_modules/chartjs-plugin-datalabels/dist/chartjs-plugin-datalabels.min.js", "assets/js/demo.js"]
            },
            "minifyCSSFiles": ["assets/css/theme.css", "assets/css/theme-dark.css"],
            "copyDependencies": {
                "dist": {
                    "*assets/js/theme-custom.js": ""
                },
                "build": {
                    "*assets/js/theme-custom.js": "",
                    "node_modules/bootstrap-icons/font/*fonts/**": "assets/css"
                }
            },
            "buildFolder": "",
            "replacePathsToCDN": {},
            "directoryNames": {
                "src": "./src",
                "dist": "./dist",
                "build": "./build"
            },
            "fileNames": {
                "dist": {
                    "js": "theme.min.js",
                    "css": "theme.min.css"
                },
                "build": {
                    "css": "theme.min.css",
                    "js": "theme.min.js",
                    "vendorCSS": "vendor.min.css",
                    "vendorJS": "vendor.min.js"
                }
            },
            "fileTypes": "jpg|png|svg|mp4|webm|ogv|json"
        }
        window.hs_config.gulpRGBA = (p1) => {
            const options = p1.split(',')
            const hex = options[0].toString()
            const transparent = options[1].toString()

            var c;
            if (/^#([A-Fa-f0-9]{3}){1,2}$/.test(hex)) {
                c = hex.substring(1).split('');
                if (c.length == 3) {
                    c = [c[0], c[0], c[1], c[1], c[2], c[2]];
                }
                c = '0x' + c.join('');
                return 'rgba(' + [(c >> 16) & 255, (c >> 8) & 255, c & 255].join(',') + ',' + transparent + ')';
            }
            throw new Error('Bad Hex');
        }
        window.hs_config.gulpDarken = (p1) => {
            const options = p1.split(',')

            let col = options[0].toString()
            let amt = -parseInt(options[1])
            var usePound = false

            if (col[0] == "#") {
                col = col.slice(1)
                usePound = true
            }
            var num = parseInt(col, 16)
            var r = (num >> 16) + amt
            if (r > 255) {
                r = 255
            } else if (r < 0) {
                r = 0
            }
            var b = ((num >> 8) & 0x00FF) + amt
            if (b > 255) {
                b = 255
            } else if (b < 0) {
                b = 0
            }
            var g = (num & 0x0000FF) + amt
            if (g > 255) {
                g = 255
            } else if (g < 0) {
                g = 0
            }
            return (usePound ? "#" : "") + (g | (b << 8) | (r << 16)).toString(16)
        }
        window.hs_config.gulpLighten = (p1) => {
            const options = p1.split(',')

            let col = options[0].toString()
            let amt = parseInt(options[1])
            var usePound = false

            if (col[0] == "#") {
                col = col.slice(1)
                usePound = true
            }
            var num = parseInt(col, 16)
            var r = (num >> 16) + amt
            if (r > 255) {
                r = 255
            } else if (r < 0) {
                r = 0
            }
            var b = ((num >> 8) & 0x00FF) + amt
            if (b > 255) {
                b = 255
            } else if (b < 0) {
                b = 0
            }
            var g = (num & 0x0000FF) + amt
            if (g > 255) {
                g = 255
            } else if (g < 0) {
                g = 0
            }
            return (usePound ? "#" : "") + (g | (b << 8) | (r << 16)).toString(16)
        }

    <script>
        $(document).on('ready', function() {
            // INITIALIZATION OF DATATABLES
            // =======================================================
            HSCore.components.HSDatatables.init($('#datatable'), {
                select: {
                    style: 'multi',
                    selector: 'td:first-child input[type="checkbox"]',
                    classMap: {
                        checkAll: '#datatableCheckAll',
                        counter: '#datatableCounter',
                        counterInfo: '#datatableCounterInfo'
                    }
                },
                language: {
                    zeroRecords: `<div class="text-center p-4">
                              <img class="mb-3" src="dashboard/assets/svg/illustrations/oc-error.svg" alt="Image Description" style="width: 10rem;" data-hs-theme-appearance="default">
                              <img class="mb-3" src="dashboard/assets/svg/illustrations-light/oc-error.svg" alt="Image Description" style="width: 10rem;" data-hs-theme-appearance="dark">
                            <p class="mb-0">无数据</p>
                            </div>`
                },
                serverSide: true,
                ajax: {
                    type: "POST",
                    url: 'CdnDomain/queryForDatatables',
                    contentType: "application/json",
                    data: function(d) {
                        if (d.order.length > 0) {
                            console.log(d.order);
                            let o = d.order[0];
                            let index = o.column;
                            let name = d.columns[index].data;
                            o.column = name;
                        }
                        d.search.columns = ['domain_name', 'cname']
                        return JSON.stringify(d);
                    },
                    dataFilter: function(data) {
                        let json = jQuery.parseJSON(data);
                        return JSON.stringify(json.data);
                    }
                },
                columns: [{
                    data: 'userId',
                    width: '10%'
                }, {
                    data: 'domainName',
                    width: '25%'
                }, {
                    data: 'cname',
                    width: '25%'
                }, {
                    data: 'businessType',
                    width: '10%'
                }, {
                    data: 'serviceArea',
                    width: '10%'
                }, {
                    data: 'domainStatus',
                    width: '10%'
                }, {
                    data: 'updateTime',
                    width: '10%'
                }, {
                    data: 'createTime',
                    width: '10%'
                }, {
                    data: null,
                    width: '15%'
                }, ],
                columnDefs: [{
                    targets: 0,
                    render: function(data, type, row, meta) {
                        return `
                        <span class="avatar avatar-sm avatar-circle">
                          <img class="avatar-img" src="${row.userImg}" alt="Image Description">
                        </span>
                        <span style="font-weight: bold">
                            ${row.userName}
                        </span>
                        `;
                    }
                }, {
                    targets: 1,
                    render: function(data, type, row, meta) {
                        return '<div class="input-group input-group-merge" style="min-width: 250px">\n' +
                            '                                <input style="color: #697786; font-size: 12px" type="text" id="tooltipExample' + row.id + '"' +
                            '                                       class="form-control"\n' +
                            '                                       value="' + data + '" readonly>\n' +
                            '                                <button class="js-clipboard input-group-append input-group-text" onclick="copy(\'tooltipExample' + row.id + '\')"\n' +
                            '                                   data-bs-toggle="tooltip" title="复制到剪切板"\n' +
                            '                                   data-hs-clipboard-options=\'{"type": "tooltip","successText": "复制成功！","contentTarget": "#tooltipExample' + row.id + '"}\'>\n' +
                            '                                    <i class="bi-clipboard"></i>\n' +
                            '                                </button>\n' +
                            '                            </div>';
                    }
                }, {
                    targets: 2,
                    render: function(data, type, row, meta) {
                        return '<div class="input-group input-group-merge" style="min-width: 250px">\n' +
                            '                                <input style="color: #697786; font-size: 12px" type="text" id="tooltipExample1' + row.id + '"' +
                            '                                       class="form-control"\n' +
                            '                                       value="' + data + '" readonly>\n' +
                            '                                <button class="js-clipboard input-group-append input-group-text" onclick="copy(\'tooltipExample1' + row.id + '\')"\n' +

                            '                                   data-hs-clipboard-options=\'{"type": "tooltip","successText": "复制成功！","contentTarget": "#tooltipExample1' + row.id + '"}\'>\n' +
                            '                                    <i class="bi-clipboard"></i>\n' +
                            '                                </button>\n' +
                            '                            </div>';
                    }
                }, {
                    targets: 3,
                    render: function(data, type, row, meta) {
                        var typeName = row.businessTypeName;
                        if (!typeName || typeName === 'null') {
                            switch (row.businessType) {
                                case 'web':
                                    typeName = '网站加速';
                                    break;
                                case 'download':
                                    typeName = '下载加速';
                                    break;
                                case 'video':
                                    typeName = '点播加速';
                                    break;
                                default:
                                    typeName = '-';
                            }
                        }
                        return '<span class="badge bg-soft-primary text-primary">' + typeName + '</span>';
                    }
                }, {
                    targets: 4,
                    render: function(data, type, row, meta) {
                        var areaName = row.serviceAreaName;
                        if (!areaName || areaName === 'null') {
                            switch (row.serviceArea) {
                                case 'CN':
                                    areaName = '中国大陆';
                                    break;
                                case 'AP':
                                    areaName = '亚太';
                                    break;
                                case 'US':
                                    areaName = '北美';
                                    break;
                                default:
                                    areaName = '海外';
                            }
                        }
                        if (areaName === '中国大陆') {
                            return '<span class="badge bg-soft-danger text-danger">' + areaName + '</span>';
                        }
                        return '<span class="badge bg-soft-success text-success">' + areaName + '</span>';
                    }
                }, {
                    targets: 5,
                    render: function(data, type, row, meta) {
                        var curStatus = row.domainStatusName;
                        if (curStatus === '已停用') {
                            // 将时间字符串转换为时间戳
                            const targetDate = new Date(row.updateTime);
                            // 获取当前时间
                            const currentDate = new Date();
                            // 计算时间差
                            const timeDiff = currentDate.getTime() - targetDate.getTime();
                            // 将时间差转换为天数
                            const daysDiff = Math.floor(timeDiff / (1000 * 3600 * 24));
                            return `
                                <span class="badge bg-soft-danger text-danger" >${curStatus}</span>
                                <span class="badge bg-soft-danger text-danger" >于${7-daysDiff}天后自动删除</span>

                            `;
                        } else if (curStatus === '已开启') {
                            return `
                                <span class="badge bg-soft-success text-success">${curStatus}</span>
                            `;
                        } else if (curStatus === '配置中') {
                            return `
                                <span class="badge bg-soft-primary text-primary">${curStatus}</span>
                            `;
                        } else {
                            return `
                                <span class="badge bg-soft-warning text-warning">${curStatus}</span>
                            `;
                        }
                    }
                }, {
                    targets: 8,
                    render: function(data, type, row, meta) {
                        let s = row.domainStatus;
                        let btn = ``;
                        if (row.domainStatus === 'offline') {
                            btn = `
                                    <button onclick="deleteDomain('${row.id}')" class="dropdown-item">
                                        <i class="bi-trash dropdown-item-icon"></i> 删除
                                    </button>
                                    <button onclick="enableDomain('${row.id}')" class="dropdown-item">
                                        <i class="bi bi-skip-start-circle dropdown-item-icon"></i> 启用
                                    </button>`;
                        }
                        if (row.domainStatus === 'online') {
                            btn = `
                                    <button onclick="disableDomain('${row.id}')" class="dropdown-item">
                                        <i class="bi bi-stop-circle dropdown-item-icon"></i> 停用
                                    </button>`;
                        }
                        let canConfigure = row.domainStatus === 'online' || row.domainStatus === 'offline';
                        let canRetrySelfHosted = String(row.route || '').indexOf('self_hosted') === 0 && row.domainStatus === 'configure_failed';
                        let configButton = canRetrySelfHosted
                            ? `<button type="button" class="btn btn-white btn-sm" onclick="retrySelfHostedDomain('${row.id}', this)">
                                    <i class="bi-arrow-repeat"></i> 重试配置
                               </button>`
                            : canConfigure
                            ? `<button type="button" class="btn btn-white btn-sm" onclick="openDomainSettingWhenReady('${row.id}', this)">
                                    <i class="bi-gear-fill"></i> 配置
                               </button>`
                            : `<button type="button" class="btn btn-white btn-sm" disabled title="域名正在配置中，请稍后刷新后再配置">
                                    <i class="bi-hourglass-split"></i> 配置中
                               </button>`;
                        let configMenu = canRetrySelfHosted
                            ? `<button type="button" class="dropdown-item" onclick="retrySelfHostedDomain('${row.id}', this)">
                                    <i class="bi-arrow-repeat dropdown-item-icon"></i> 重试配置
                               </button>`
                            : canConfigure
                            ? `<button type="button" class="dropdown-item" onclick="openDomainSettingWhenReady('${row.id}', this)">
                                    <i class="bi-gear-fill dropdown-item-icon"></i> 配置
                               </button>`
                            : `<button type="button" class="dropdown-item" onclick="layerWarn('域名正在配置中，请稍后刷新后再配置')">
                                    <i class="bi-hourglass-split dropdown-item-icon"></i> 配置中
                               </button>`;

                        return `
                            <a class="btn btn-white btn-sm" href="statistics-resource?id=${row.id}">
                                <i class="bi bi-bar-chart-fill"></i> 统计
                            </a>
                            <div class="btn-group" role="group">
                                ${configButton}

                                <div class="btn-group">
                                    <button type="button"
                                            class="btn btn-white btn-icon btn-sm dropdown-toggle dropdown-toggle-empty"
                                            id="productsEditDropdown1" data-bs-toggle="dropdown"
                                            aria-expanded="false"></button>

                                    <div class="dropdown-menu dropdown-menu-end mt-1"
                                         aria-labelledby="productsEditDropdown1">
                                        ${configMenu}
                                        ${btn}
                                        <button onclick="confirmDelete('forceDeleteDomain(\\'${row.id}\\')')" class="dropdown-item">
                                        <i class="bi-trash dropdown-item-icon"></i> 强制删除
                                        </button>
                                    </div>
                                </div>
                            </div>
                        `
                    }
                }, {
                    "orderable": false,
                    "targets": [0, 1, 2, 3, 4, 5, 8]
                }, ],
            });

            const datatable = HSCore.components.HSDatatables.getItem('datatable')

            $('.js-datatable-filter').on('change', function() {
                var $this = $(this),
                    elVal = $this.val(),
                    targetColumnIndex = $this.data('target-column-index');

                datatable.column(targetColumnIndex).search(elVal).draw();
            });

            $('#datatableSearch').on('mouseup', function(e) {
                var $input = $(this),
                    oldValue = $input.val();

                if (oldValue == "") return;

                setTimeout(function() {
                    var newValue = $input.val();

                    if (newValue == "") {
                        // Gotcha
                        datatable.search('').draw();
                    }
                }, 1);
            });

            $('#toggleColumn_product').change(function(e) {
                datatable.columns(1).visible(e.target.checked)
            })

            $('#toggleColumn_type').change(function(e) {
                datatable.columns(2).visible(e.target.checked)
            })


            $('#toggleColumn_vendor').change(function(e) {
                datatable.columns(3).visible(e.target.checked)
            })

            $('#toggleColumn_stocks').change(function(e) {
                datatable.columns(4).visible(e.target.checked)
            })

            $('#toggleColumn_sku').change(function(e) {
                datatable.columns(5).visible(e.target.checked)
            })

            $('#toggleColumn_price').change(function(e) {
                datatable.columns(6).visible(e.target.checked)
            })

            $('#toggleColumn_quantity').change(function(e) {
                datatable.columns(7).visible(e.target.checked)
            })

            $('#toggleColumn_variants').change(function(e) {
                datatable.columns(8).visible(e.target.checked)
            })
        });
    </script>

    <!-- Style Switcher JS -->

    <script>
        (function() {
            // STYLE SWITCHER
            // =======================================================
            const $dropdownBtn = document.getElementById('selectThemeDropdown') // Dropdowon trigger
            const $variants = document.querySelectorAll(`[aria-labelledby="selectThemeDropdown"] [data-icon]`) // All items of the dropdown

            // Function to set active style in the dorpdown menu and set icon for dropdown trigger
            const setActiveStyle = function() {
                $variants.forEach($item => {
                    if ($item.getAttribute('data-value') === HSThemeAppearance.getOriginalAppearance()) {
                        $dropdownBtn.innerHTML = `<i class="${$item.getAttribute('data-icon')}" />`
                        return $item.classList.add('active')
                    }

                    $item.classList.remove('active')
                })
            }

            // Add a click event to all items of the dropdown to set the style
            $variants.forEach(function($item) {
                $item.addEventListener('click', function() {
                    HSThemeAppearance.setAppearance($item.getAttribute('data-value'))
                })
            })

            // Call the setActiveStyle on load page
            setActiveStyle()

            // Add event listener on change style to call the setActiveStyle function
            window.addEventListener('on-hs-appearance-change', function() {
                setActiveStyle()
            })


        })()
    </script>

    <!-- End Style Switcher JS -->
