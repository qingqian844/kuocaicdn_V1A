            },
            "minifyCSSFiles": ["assets/css/theme.css", "assets/css/theme-dark.css"],
            "copyDependencies": {
                "dist": {"*assets/js/theme-custom.js": ""},
                "build": {"*assets/js/theme-custom.js": "", "node_modules/bootstrap-icons/font/*fonts/**": "assets/css"}
            },
            "buildFolder": "",
            "replacePathsToCDN": {},
            "directoryNames": {"src": "./src", "dist": "./dist", "build": "./build"},
            "fileNames": {
                "dist": {"js": "theme.min.js", "css": "theme.min.css"},
                "build": {
                    "css": "theme.min.css",
                    "js": "theme.min.js",
                    "vendorCSS": "vendor.min.css",
                    "vendorJS": "vendor.min.js"
                }
            },
            "fileTypes": "jpg|png|svg|mp4|webm|ogv|json"
        }
        window.hs_config.gulpRGBA = (p1) => {
            const options = p1.split(',')
            const hex = options[0].toString()
            const transparent = options[1].toString()

            var c;
            if (/^#([A-Fa-f0-9]{3}){1,2}$/.test(hex)) {
                c = hex.substring(1).split('');
                if (c.length == 3) {
                    c = [c[0], c[0], c[1], c[1], c[2], c[2]];
                }
                c = '0x' + c.join('');
                return 'rgba(' + [(c >> 16) & 255, (c >> 8) & 255, c & 255].join(',') + ',' + transparent + ')';
            }
            throw new Error('Bad Hex');
        }
        window.hs_config.gulpDarken = (p1) => {
            const options = p1.split(',')

            let col = options[0].toString()
            let amt = -parseInt(options[1])
            var usePound = false

            if (col[0] == "#") {
                col = col.slice(1)
                usePound = true
            }
            var num = parseInt(col, 16)
            var r = (num >> 16) + amt
            if (r > 255) {
                r = 255
            } else if (r < 0) {
                r = 0
            }
            var b = ((num >> 8) & 0x00FF) + amt
            if (b > 255) {
                b = 255
            } else if (b < 0) {
                b = 0
            }
            var g = (num & 0x0000FF) + amt
            if (g > 255) {
                g = 255
            } else if (g < 0) {
                g = 0
            }
            return (usePound ? "#" : "") + (g | (b << 8) | (r << 16)).toString(16)
        }
        window.hs_config.gulpLighten = (p1) => {
            const options = p1.split(',')

            let col = options[0].toString()
            let amt = parseInt(options[1])
            var usePound = false

            if (col[0] == "#") {
                col = col.slice(1)
                usePound = true
            }
            var num = parseInt(col, 16)
            var r = (num >> 16) + amt
            if (r > 255) {
                r = 255
            } else if (r < 0) {
                r = 0
            }
            var b = ((num >> 8) & 0x00FF) + amt
            if (b > 255) {
                b = 255
            } else if (b < 0) {
                b = 0
            }
            var g = (num & 0x0000FF) + amt
            if (g > 255) {
                g = 255
            } else if (g < 0) {
                g = 0
            }
            return (usePound ? "#" : "") + (g | (b << 8) | (r << 16)).toString(16)
        }
    </script>

<script>
    $(document).on('ready', function () {
        // INITIALIZATION OF CHARTJS
        // =======================================================
        HSCore.components.HSChartJS.init('.js-chart')

        // INITIALIZATION OF DATERANGEPICKER
        // =======================================================
        $('.js-daterangepicker').daterangepicker();

        $('.js-daterangepicker-times').daterangepicker({
            timePicker: true,
            startDate: moment().startOf('hour'),
            endDate: moment().startOf('hour').add(32, 'hour'),
            locale: {
                format: 'M/DD hh:mm A'
            }
        });

        async function cbFlux(start, end, lebel) {
            $('#daterangepicker-predefined .daterangepicker-predefined-preview').html(start.format('YYYY/MM/DD') + ' - ' + end.format('YYYY/MM/DD'));
            let startTime = start.format('YYYY-MM-DD') + ' 00:00:00';
            let endTime = end.add(1, 'days').format('YYYY-MM-DD') + ' 00:00:00'
            if (lebel === '自定义范围') {
                if (end.diff(start, 'day') > 30) {
                    layerWarn("最大支持查询天数为30天！");
                    return;
                }
            }
            let result = await queryResourceStatistics('[[${cdnDomain.id}]]', startTime, endTime);
            let flux = result.resource_summary.flux;
            let bs_flux = result.resource_summary.bs_flux;
            let bw = result.resource_summary.bw;
            let bs_bw = result.resource_summary.bs_bw;

            $('#sum_flux').text(flux === undefined ? 0 : flux);
            $('#sum_bs_flux').text(bs_flux === undefined ? 0 : bs_flux);
            $('#sum_bw').text(bw === undefined ? 0 : bw);
            $('#sum_bs_bw').text(bs_bw === undefined ? 0 : bs_bw);

            const fluxChart = HSCore.components.HSChartJS.getItem('fluxChart');
            fluxChart.data.labels = result.labels;
            fluxChart.data.datasets[0].data = result.resource_detail.flux.data;
            fluxChart.data.datasets[1].data = result.resource_detail.bs_flux.data;
            fluxChart.options.plugins.tooltip.postfix = result.resource_detail.flux.unit;
            fluxChart.update();
            const bwChart = HSCore.components.HSChartJS.getItem('bwChart');
            bwChart.data.labels = result.labels;
            bwChart.data.datasets[0].data = result.resource_detail.bw.data;
            bwChart.data.datasets[1].data = result.resource_detail.bs_bw.data;
            bwChart.options.plugins.tooltip.postfix = result.resource_detail.bw.unit;
            bwChart.update();
        }

        $('#daterangepicker-predefined').daterangepicker({
            startDate: start,
            endDate: end,
            "locale": {//汉化
                format: "YYYY-MM-DD",
                separator: " 至 ",
                applyLabel: "应用",
                cancelLabel: "取消",
                customRangeLabel: "自定义范围",
                daysOfWeek: ['日', '一', '二', '三', '四', '五', '六'],
                monthNames: ['一月', '二月', '三月', '四月', '五月', '六月',
                    '七月', '八月', '九月', '十月', '十一月', '十二月'],
            },
            ranges: {
                '今天': [moment(), moment()],
                '昨天': [moment().subtract(1, 'days'), moment().subtract(1, 'days')],
                '最近7天': [moment().subtract(6, 'days'), moment()],
                '最近30天': [moment().subtract(29, 'days'), moment()]
            }
        }, cbFlux);

        var start = moment();
        var end = moment();
        cbFlux(start, end);
    });
</script>

<!-- Style Switcher JS -->

<script>
    (function () {
        // STYLE SWITCHER
        // =======================================================
        const $dropdownBtn = document.getElementById('selectThemeDropdown') // Dropdowon trigger
        const $variants = document.querySelectorAll(`[aria-labelledby="selectThemeDropdown"] [data-icon]`) // All items of the dropdown

        // Function to set active style in the dorpdown menu and set icon for dropdown trigger
        const setActiveStyle = function () {
            $variants.forEach($item => {
                if ($item.getAttribute('data-value') === HSThemeAppearance.getOriginalAppearance()) {
                    $dropdownBtn.innerHTML = `<i class="${$item.getAttribute('data-icon')}" />`
                    return $item.classList.add('active')
                }

                $item.classList.remove('active')
            })
        }

        // Add a click event to all items of the dropdown to set the style
        $variants.forEach(function ($item) {
            $item.addEventListener('click', function () {
                HSThemeAppearance.setAppearance($item.getAttribute('data-value'))
            })
        })

        // Call the setActiveStyle on load page
        setActiveStyle()

        // Add event listener on change style to call the setActiveStyle function
        window.addEventListener('on-hs-appearance-change', function () {
            setActiveStyle()
        })

    })()
</script>

<!-- End Style Switcher JS -->
