        window.hs_config = {

            "deleteLine": "hs-builder:delete",
            "deleteLine:build": "hs-builder:build-delete",
            "deleteLine:dist": "hs-builder:dist-delete",
            "previewMode": false,
            "startPath": "index",
            "vars": {
                "themeFont": "https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap",
                "version": "?v=1.0"
            },
            "layoutBuilder": {
                "extend": {"switcherSupport": true},
                "header": {"layoutMode": "default", "containerMode": "container-fluid"},
                "sidebarLayout": "default"
            },
            "themeAppearance": {
                "layoutSkin": "default",
                "sidebarSkin": "default",
                "styles": {
                    "colors": {
                        "primary": "#377dff",
                        "transparent": "transparent",
                        "white": "#fff",
                        "dark": "132144",
                        "gray": {"100": "#f9fafc", "900": "#1e2022"}
                    }, "font": "Inter"
                }
            },
            "languageDirection": {"lang": "en"},
            "skipFilesFromBundle": {
                "dist": ["assets/js/hs.theme-appearance.js", "assets/js/hs.theme-appearance-charts.js", "assets/js/demo.js"],
                "build": ["assets/css/theme.css", "assets/vendor/hs-navbar-vertical-aside/dist/hs-navbar-vertical-aside-mini-cache.js", "assets/js/demo.js", "assets/css/theme-dark.css", "assets/css/docs.css", "assets/vendor/icon-set/style.css", "assets/js/hs.theme-appearance.js", "assets/js/hs.theme-appearance-charts.js", "node_modules/chartjs-plugin-datalabels/dist/chartjs-plugin-datalabels.min.js", "assets/js/demo.js"]
            },
            "minifyCSSFiles": ["assets/css/theme.css", "assets/css/theme-dark.css"],
            "copyDependencies": {
                "dist": {"*assets/js/theme-custom.js": ""},
                "build": {"*assets/js/theme-custom.js": "", "node_modules/bootstrap-icons/font/*fonts/**": "assets/css"}
            },
            "buildFolder": "",
            "replacePathsToCDN": {},
            "directoryNames": {"src": "./src", "dist": "./dist", "build": "./build"},
            "fileNames": {
                "dist": {"js": "theme.min.js", "css": "theme.min.css"},
                "build": {
                    "css": "theme.min.css",
                    "js": "theme.min.js",
                    "vendorCSS": "vendor.min.css",
                    "vendorJS": "vendor.min.js"
                }
            },
            "fileTypes": "jpg|png|svg|mp4|webm|ogv|json"
        }
        window.hs_config.gulpRGBA = (p1) => {
            const options = p1.split(',')
            const hex = options[0].toString()
            const transparent = options[1].toString()

            var c;
            if (/^#([A-Fa-f0-9]{3}){1,2}$/.test(hex)) {
                c = hex.substring(1).split('');
                if (c.length == 3) {
                    c = [c[0], c[0], c[1], c[1], c[2], c[2]];
                }
                c = '0x' + c.join('');
                return 'rgba(' + [(c >> 16) & 255, (c >> 8) & 255, c & 255].join(',') + ',' + transparent + ')';
            }
            throw new Error('Bad Hex');
        }
        window.hs_config.gulpDarken = (p1) => {
            const options = p1.split(',')

            let col = options[0].toString()
            let amt = -parseInt(options[1])
            var usePound = false

            if (col[0] == "#") {
                col = col.slice(1)
                usePound = true
            }
            var num = parseInt(col, 16)
            var r = (num >> 16) + amt
            if (r > 255) {
                r = 255
            } else if (r < 0) {
                r = 0
            }
            var b = ((num >> 8) & 0x00FF) + amt
            if (b > 255) {
                b = 255
            } else if (b < 0) {
                b = 0
            }
            var g = (num & 0x0000FF) + amt
            if (g > 255) {
                g = 255
            } else if (g < 0) {
                g = 0
            }
            return (usePound ? "#" : "") + (g | (b << 8) | (r << 16)).toString(16)
        }
        window.hs_config.gulpLighten = (p1) => {
            const options = p1.split(',')

            let col = options[0].toString()
            let amt = parseInt(options[1])
            var usePound = false

            if (col[0] == "#") {
                col = col.slice(1)
                usePound = true
            }
            var num = parseInt(col, 16)
            var r = (num >> 16) + amt
            if (r > 255) {
                r = 255
            } else if (r < 0) {
                r = 0
            }
            var b = ((num >> 8) & 0x00FF) + amt
            if (b > 255) {
                b = 255
            } else if (b < 0) {
                b = 0
            }
            var g = (num & 0x0000FF) + amt
            if (g > 255) {
                g = 255
            } else if (g < 0) {
                g = 0
            }
            return (usePound ? "#" : "") + (g | (b << 8) | (r << 16)).toString(16)
        }
    </script>

<!-- JS Plugins Init. -->
<script>
    (function (window, gt, doc) {
        const gta = '949c66977e30cb2d8dd5643cf0bc6451'
        const vn = '#man-machine-verification'
        const sendBtn = doc.getElementById('sendCodeBtn')
        const resetBtn = doc.getElementById('resetPasswordBtn')
        const accountInput = doc.getElementById('userAccount')
        let gtn = null
        let countdownTimer = null

        function load() {
            new HSTogglePassword('.js-toggle-password')
            HSCore.components.HSTomSelect.init('.js-select')
        }

        function gtb(a) {
            a.appendTo(vn).onSuccess(gts)
            gtn = a
        }

        function gts() {
            sendBtn.disabled = false
        }

        function startCountdown() {
            let seconds = 60
            sendBtn.disabled = true
            sendBtn.textContent = seconds + '秒后重发'
            countdownTimer = window.setInterval(function () {
                seconds -= 1
                if (seconds <= 0) {
                    window.clearInterval(countdownTimer)
                    countdownTimer = null
                    sendBtn.textContent = '重新发送'
                    sendBtn.disabled = false
                    return
                }
                sendBtn.textContent = seconds + '秒后重发'
            }, 1000)
        }

        async function sendCode() {
            const account = accountInput.value.trim()
            const result = gtn && gtn.getValidate()
            if (!account) {
                layerWarn('账户不可为空')
                return
            }
            if (!result) {
                layerWarn('请完成人机验证！')
                return
            }
            if (typeof sendPasswordResetCode !== 'function') {
                layerFail('页面资源未更新，请刷新页面后重试')
                return
            }
            sendBtn.disabled = true
            try {
                const data = await sendPasswordResetCode({
                    userAccount: account,
                    verify: JSON.stringify({
                        captcha_id: gta,
                        lot_number: result.lot_number,
                        gen_time: result.gen_time,
                        pass_token: result.pass_token,
                        captcha_output: result.captcha_output
                    })
                })
                autoLayer(data)
                gtn.reset()
                if (data.code === 'SUCCESS') {
                    startCountdown()
                    doc.getElementById('resetCode').focus()
                } else {
                    sendBtn.disabled = true
                }
            } catch (error) {
                gtn.reset()
                sendBtn.disabled = true
            }
        }

        async function submitReset() {
            const userAccount = accountInput.value.trim()
            const code = doc.getElementById('resetCode').value.trim()
            const newPassword = doc.getElementById('newPassword').value
            const confirmPassword = doc.getElementById('confirmPassword').value
            if (!userAccount || !code || !newPassword || !confirmPassword) {
                layerWarn('请完整填写重置信息')
                return
            }
            if (newPassword.length < 8 || newPassword.length > 16) {
                layerWarn('密码长度必须为8至16位')
                return
            }
            if (newPassword !== confirmPassword) {
                layerWarn('两次输入的密码不一致')
                return
            }
            if (typeof resetPassword !== 'function') {
                layerFail('页面资源未更新，请刷新页面后重试')
                return
            }
            resetBtn.disabled = true
            try {
                const data = await resetPassword({ userAccount, code, newPassword, confirmPassword })
                autoLayer(data)
                if (data.code === 'SUCCESS') {
                    window.setTimeout(function () {
                        window.location.href = 'user-login'
                    }, 1200)
                    return
                }
            } catch (error) {
                // sendRequest already displays the request error.
            }
            resetBtn.disabled = false
        }

        window.addEventListener('load', load, false)
        sendBtn.addEventListener('click', sendCode, false)
        resetBtn.addEventListener('click', submitReset, false)
        gt({ captchaId: gta }, gtb)
    })(window, initGeetest4, document)
</script>
