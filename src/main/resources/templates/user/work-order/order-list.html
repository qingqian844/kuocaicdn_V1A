    <script>
        window.hs_config = {
            "autopath": "@@autopath",
            "deleteLine": "hs-builder:delete",
            "deleteLine:build": "hs-builder:build-delete",
            "deleteLine:dist": "hs-builder:dist-delete",
            "previewMode": false,
            "startPath": "/index.html",
            "vars": {
                "themeFont": "https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap",
                "version": "?v=1.0"
            },
            "layoutBuilder": {
                "extend": {"switcherSupport": true},
                "header": {"layoutMode": "default", "containerMode": "container-fluid"},
                "sidebarLayout": "default"
            },
            "themeAppearance": {
                "layoutSkin": "default",
                "sidebarSkin": "default",
                "styles": {
                    "colors": {
                        "primary": "#377dff",
                        "transparent": "transparent",
                        "white": "#fff",
                        "dark": "132144",
                        "gray": {"100": "#f9fafc", "900": "#1e2022"}
                    }, "font": "Inter"
                }
            },
            "languageDirection": {"lang": "en"},
            "skipFilesFromBundle": {
                "dist": ["assets/js/hs.theme-appearance.js", "assets/js/hs.theme-appearance-charts.js", "assets/js/demo.js"],
                "build": ["assets/css/theme.css", "assets/vendor/hs-navbar-vertical-aside/dist/hs-navbar-vertical-aside-mini-cache.js", "assets/js/demo.js", "assets/css/theme-dark.css", "assets/css/docs.css", "assets/vendor/icon-set/style.css", "assets/js/hs.theme-appearance.js", "assets/js/hs.theme-appearance-charts.js", "node_modules/chartjs-plugin-datalabels/dist/chartjs-plugin-datalabels.min.js", "assets/js/demo.js"]
            },
            "minifyCSSFiles": ["assets/css/theme.css", "assets/css/theme-dark.css"],
            "copyDependencies": {
                "dist": {"*assets/js/theme-custom.js": ""},
                "build": {"*assets/js/theme-custom.js": "", "node_modules/bootstrap-icons/font/*fonts/**": "assets/css"}
            },
            "buildFolder": "",
            "replacePathsToCDN": {},
            "directoryNames": {"src": "./src", "dist": "./dist", "build": "./build"},
            "fileNames": {
                "dist": {"js": "theme.min.js", "css": "theme.min.css"},
                "build": {
                    "css": "theme.min.css",
                    "js": "theme.min.js",
                    "vendorCSS": "vendor.min.css",
                    "vendorJS": "vendor.min.js"
                }
            },
            "fileTypes": "jpg|png|svg|mp4|webm|ogv|json"
        }
        window.hs_config.gulpRGBA = (p1) => {
            const options = p1.split(',')
            const hex = options[0].toString()
            const transparent = options[1].toString()

            var c;
            if (/^#([A-Fa-f0-9]{3}){1,2}$/.test(hex)) {
                c = hex.substring(1).split('');
                if (c.length == 3) {
                    c = [c[0], c[0], c[1], c[1], c[2], c[2]];
                }
                c = '0x' + c.join('');
                return 'rgba(' + [(c >> 16) & 255, (c >> 8) & 255, c & 255].join(',') + ',' + transparent + ')';
            }
            throw new Error('Bad Hex');
        }
        window.hs_config.gulpDarken = (p1) => {
            const options = p1.split(',')

            let col = options[0].toString()
            let amt = -parseInt(options[1])
            var usePound = false

            if (col[0] == "#") {
                col = col.slice(1)
                usePound = true
            }
            var num = parseInt(col, 16)
            var r = (num >> 16) + amt
            if (r > 255) {
                r = 255
            } else if (r < 0) {
                r = 0
            }
            var b = ((num >> 8) & 0x00FF) + amt
            if (b > 255) {
                b = 255
            } else if (b < 0) {
                b = 0
            }
            var g = (num & 0x0000FF) + amt
            if (g > 255) {
                g = 255
            } else if (g < 0) {
                g = 0
            }
            return (usePound ? "#" : "") + (g | (b << 8) | (r << 16)).toString(16)
        }
        window.hs_config.gulpLighten = (p1) => {
            const options = p1.split(',')

            let col = options[0].toString()
            let amt = parseInt(options[1])
            var usePound = false

            if (col[0] == "#") {
                col = col.slice(1)
                usePound = true
            }
            var num = parseInt(col, 16)
            var r = (num >> 16) + amt
            if (r > 255) {
                r = 255
            } else if (r < 0) {
                r = 0
            }
            var b = ((num >> 8) & 0x00FF) + amt
            if (b > 255) {
                b = 255
            } else if (b < 0) {
                b = 0
            }
            var g = (num & 0x0000FF) + amt
            if (g > 255) {
                g = 255
            } else if (g < 0) {
                g = 0
            }
            return (usePound ? "#" : "") + (g | (b << 8) | (r << 16)).toString(16)
        }
    </script>

<script>
    $(document).on('ready', function () {
        // INITIALIZATION OF DATATABLES
        // =======================================================
        HSCore.components.HSDatatables.init($('#datatable'), {
            select: {
                style: 'multi',
                selector: 'td:first-child input[type="checkbox"]',
                classMap: {
                    checkAll: '#datatableCheckAll',
                    counter: '#datatableCounter',
                    counterInfo: '#datatableCounterInfo'
                }
            },
            language: {
                zeroRecords: `<div class="text-center p-4">
                              <img class="mb-3" src="dashboard/assets/svg/illustrations/oc-error.svg" alt="Image Description" style="width: 10rem;" data-hs-theme-appearance="default">
                              <img class="mb-3" src="dashboard/assets/svg/illustrations-light/oc-error.svg" alt="Image Description" style="width: 10rem;" data-hs-theme-appearance="dark">
                            <p class="mb-0">无数据</p>
                            </div>`
            },
            serverSide: true,
            ajax: {
                type: "POST",
                url: 'WorkOrder/queryForDatatables',
                contentType: "application/json",
                data: function (d) {
                    if (d.order.length > 0) {
                        console.log(d.order);
                        let o = d.order[0];
                        let index = o.column;
                        let name = d.columns[index].data;
                        o.column = name;
                    }
                    d.search.columns = ['cd', 'title']
                    return JSON.stringify(d);
                },
                dataFilter: function (data) {
                    let json = jQuery.parseJSON(data);
                    return JSON.stringify(json.data);
                }
            },
            columns: [
                {width: '5%', data: null},
                {width: '5%', data: null},
                {width: '20%', data: 'cd'},
                {width: '25%', data: 'title'},
                {width: '10%', data: 'typeId'},
                {width: '10%', data: 'urgentLevel'},
                {width: '10%', data: 'status'},
                {width: '10%', data: 'result'},
                {width: '10%', data: 'createTime'},
                {width: '15%', data: null},
            ],
            columnDefs: [
                {
                    targets: 0,
                    render: function (data, type, row, meta) {
                        // console.log(type);
                        // console.log(row);
                        // console.log(meta);
                        return '<div class="form-check">' +
                            '<input style="border: 1px solid #677788;" name="batchCheck" class="form-check-input" type="checkbox" value="' + data.id + '" id="usersDataCheck' + data.id + '">' +
                            '<label class="form-check-label" for="usersDataCheck' + data.id + '"></label>' +
                            '</div>'
                    }
                },
                {
                    targets: 1,
                    render: function (data, type, row, meta) {
                        return `
                        <span class="avatar avatar-sm avatar-circle">
                          <img class="avatar-img" src="${row.userImg}" alt="Image Description">
                        </span>
                        <span style="font-weight: bold">
                            ${row.userName}
                        </span>
                        `;
                    }
                },
                {
                    targets: 4,
                    render: function (data, type, row, meta) {
                        return row.typeName;
                    }
                },
                {
                    targets: 5,
                    render: function (data, type, row, meta) {
                        if (data === 'common') {
                            return `<span class="badge bg-soft-primary text-primary">一般咨询</span>`;
                        }
                        if (data === 'experience') {
                            return `<span class="badge bg-soft-primary text-primary">操作体验</span>`;
                        }
                        if (data === 'exception') {
                            return `<span class="badge bg-soft-primary text-primary">系统异常</span>`;
                        }
                    }
                },
                {
                    targets: 6,
                    render: function (data, type, row, meta) {
                        if (data === 'waiting') {
                            return `<span class="badge bg-soft-warning text-warning">等待处理</span>`;
                        }
                        if (data === 'in_process') {
                            return `<span class="badge bg-soft-primary text-primary">处理中</span>`;
                        }
                        if (data === 'close') {
                            return `<span class="badge bg-soft-secondary text-secondary">已关闭</span>`;
                        }
                    }
                },
                {
                    targets: 7,
                    render: function (data, type, row, meta) {
                        if (!data || data === '') {
                            return `<span class="badge bg-soft-secondary text-secondary">-</span>`;
                        }
                        if (data === 'finished') {
                            return `<span class="badge bg-soft-success text-success">已解决</span>`;
                        }
                        if (data === 'unfinished') {
                            return `<span class="badge bg-soft-danger text-danger">未解决</span>`;
                        }
                    }
                },
                {
                    targets: 9,

<!-- Style Switcher JS -->

<script>
    (function () {
        // STYLE SWITCHER
        // =======================================================
        const $dropdownBtn = document.getElementById('selectThemeDropdown') // Dropdowon trigger
        const $variants = document.querySelectorAll(`[aria-labelledby="selectThemeDropdown"] [data-icon]`) // All items of the dropdown

        // Function to set active style in the dorpdown menu and set icon for dropdown trigger
        const setActiveStyle = function () {
            $variants.forEach($item => {
                if ($item.getAttribute('data-value') === HSThemeAppearance.getOriginalAppearance()) {
                    $dropdownBtn.innerHTML = `<i class="${$item.getAttribute('data-icon')}" />`
                    return $item.classList.add('active')
                }

                $item.classList.remove('active')
            })
        }

        // Add a click event to all items of the dropdown to set the style
        $variants.forEach(function ($item) {
            $item.addEventListener('click', function () {
                HSThemeAppearance.setAppearance($item.getAttribute('data-value'))
            })
        })

        // Call the setActiveStyle on load page
        setActiveStyle()

        // Add event listener on change style to call the setActiveStyle function
        window.addEventListener('on-hs-appearance-change', function () {
            setActiveStyle()
        })

    })()
</script>
